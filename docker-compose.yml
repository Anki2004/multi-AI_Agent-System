version: "3.9"

services:
  api:
    build: .
    container_name: cybersec_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./outputs:/app/outputs
      # Mount host logs into container for real cloud server detection
      - /var/log/auth.log:/var/log/auth.log:ro
      - /var/log/syslog:/var/log/syslog:ro
    restart: unless-stopped

  ui:
    image: python:3.11-slim
    container_name: cybersec_ui
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install streamlit requests -q &&
             streamlit run ui/streamlit_app/ui.py
             --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped
